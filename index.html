 <!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI Fake News Detector</title>

<style>

body{
margin:0;
padding:0;
font-family:Arial, Helvetica, sans-serif;
background:linear-gradient(135deg,#0f172a,#020617);
color:white;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
}

.container{
width:90%;
max-width:600px;
background:#1e293b;
padding:30px;
border-radius:12px;
box-shadow:0 0 25px rgba(0,0,0,0.6);
text-align:center;
}

h1{
margin-bottom:10px;
}

.subtitle{
color:#94a3b8;
margin-bottom:20px;
}

textarea{
width:100%;
height:160px;
padding:12px;
border-radius:8px;
border:none;
outline:none;
resize:none;
font-size:14px;
margin-bottom:20px;
background:#020617;
color:white;
}

button{
width:100%;
padding:12px;
border:none;
border-radius:8px;
background:#6366f1;
color:white;
font-size:16px;
cursor:pointer;
transition:0.3s;
}

button:hover{
background:#4f46e5;
}

#result{
margin-top:20px;
padding:15px;
background:#020617;
border-radius:8px;
min-height:60px;
color:#e2e8f0;
}

</style>
</head>

<body>

<div class="container">

<h1>AI Fake News Detector</h1>

<p class="subtitle">
Paste any news text and AI will detect whether it is Fake, Real, or Uncertain
</p>

<textarea id="newsInput" placeholder="Paste news here..."></textarea>

<button onclick="checkNews()">Check News</button>

<div id="result">Result will appear here...</div>

</div>

<script>

const API_KEY = "Add your API";

async function checkNews(){

const userText = document.getElementById("newsInput").value;
const resultBox = document.getElementById("result");

if(userText.trim() === ""){
resultBox.innerText="Please paste some news text.";
return;
}

resultBox.innerText="Analyzing news with AI...";

const prompt = `
Analyze the following news and classify it as:
Fake, Real, or Uncertain.

Give a short explanation.

News:
${userText}
`;

try{

const response = await fetch(
`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key=${API_KEY}`,
{
method:"POST",
headers:{
"Content-Type":"application/json"
},
body:JSON.stringify({
contents:[
{
parts:[{text:prompt}]
}
]
})
}
);

const data = await response.json();

const aiText = data.candidates[0].content.parts[0].text;

resultBox.innerText = aiText;

}

catch(error){

resultBox.innerText="Error detecting news.";
console.log(error);

}

}

</script>

</body>
</html>
